<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RICHI28 | Professional Betting Platform</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #ffb900;
            --dark-main: #0a0e17;
            --dark-card: #161b28;
            --blue-accent: #007aff;
            --text-gray: #8e94a0;
        }

        body {
            background-color: var(--dark-main);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0; padding-bottom: 70px;
        }

        /* Top Bar */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: var(--dark-card); border-bottom: 1px solid #232a3d;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 20px; font-weight: 900; color: var(--gold); letter-spacing: 1px; }

        .auth-buttons button {
            padding: 8px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer;
        }
        .reg-btn { background: var(--blue-accent); color: white; }

        /* Balance Section */
        .user-panel {
            background: var(--dark-card); margin: 10px; padding: 15px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .balance-info div { font-size: 12px; color: var(--text-gray); }
        .balance-info h2 { font-size: 22px; color: white; }

        .quick-dep {
            background: var(--gold); color: black; padding: 10px 20px; border-radius: 8px;
            border: none; font-weight: 900;
        }

        /* Categories */
        .categories {
            display: flex; gap: 10px; padding: 10px; overflow-x: auto; white-space: nowrap;
        }
        .cat-item {
            background: var(--dark-card); padding: 10px 20px; border-radius: 30px;
            font-size: 13px; border: 1px solid #232a3d;
        }
        .cat-item.active { border-color: var(--gold); color: var(--gold); }

        /* Game Grid */
        .game-section { padding: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card {
            background: var(--dark-card); border-radius: 12px; position: relative;
            aspect-ratio: 16/10; overflow: hidden; border: 1px solid #232a3d;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; position: absolute; opacity: 0.4; }
        .card span { position: relative; z-index: 1; font-weight: bold; font-size: 14px; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: var(--dark-card);
            display: flex; justify-content: space-around; padding: 10px 0;
            border-top: 1px solid #232a3d; z-index: 1000;
        }
        .nav-link { text-align: center; color: var(--text-gray); font-size: 10px; text-decoration: none; }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-link.active { color: var(--gold); }

        /* Modal Styles */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px;
        }
        .modal-content { background: var(--dark-card); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-gray); margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 12px; background: #0a0e17; border: 1px solid #232a3d; color: white; border-radius: 8px; }
        
        .pay-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .pay-item { background: #0a0e17; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #232a3d; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="logo">RICHI28</div>
        <div class="auth-buttons">
            <button class="reg-btn" onclick="openModal('regModal')">REGISTRATSIYA</button>
        </div>
    </div>

    <div class="user-panel">
        <div class="balance-info">
            <div>Asosiy Balans</div>
            <h2 id="userBalance">0.00 UZS</h2>
        </div>
        <button class="quick-dep" onclick="openModal('depModal')">DEPOZIT</button>
    </div>

    <div class="categories">
        <div class="cat-item active">HAMMASI</div>
        <div class="cat-item">SLOTLAR</div>
        <div class="cat-item">LIVE CASINO</div>
        <div class="cat-item">SPORT</div>
        <div class="cat-item">VIRTUAL</div>
    </div>

    <div class="game-section">
        <h3 style="margin-bottom:15px; font-size: 16px;">MASHHUR O'YINLAR</h3>
        <div class="grid">
            <div class="card" onclick="window.location.href='https://demo.spribe.io/games/aviator'">
                <span>🚀 AVIATOR</span>
            </div>
            <div class="card" onclick="window.location.href='https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?gameSymbol=vs20olympgate'">
                <span>⚡ GATES OF OLYMPUS</span>
            </div>
            <div class="card" onclick="window.location.href='https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?gameSymbol=vswayshammmer'">
                <span>🃏 LIVE CASINO</span>
            </div>
            <div class="card" onclick="alert('Tez kunda!')">
                <span>⚽ FUTBOL LINIYASI</span>
            </div>
        </div>
    </div>

    <div id="regModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--gold)">REGISTRATSIYA</h2>
            <div class="form-group">
                <label>Email yoki Telefon</label>
                <input type="text" placeholder="Kiriting...">
            </div>
            <div class="form-group">
                <label>Parol</label>
                <input type="password" placeholder="********">
            </div>
            <div class="form-group">
                <label>Promokod (Majburiy emas)</label>
                <input type="text" placeholder="Masalan: RICHI777" style="border-color: var(--gold)">
            </div>
            <button class="quick-dep" style="width:100%" onclick="closeModal('regModal')">HISOB OCHISH</button>
        </div>
    </div>

    <div id="depModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--gold)">HISOBNI TO'LDIRISH</h2>
            <div class="pay-methods">
                <div class="pay-item" onclick="alert('Karta: 8600... Chekni botga yuboring!')">💳 UZCARD/HUMO</div>
                <div class="pay-item">₿ CRYPTO (USDT)</div>
                <div class="pay-item">🌐 VISA/MASTERCARD</div>
                <div class="pay-item">🅿️ PAYME/CLICK</div>
            </div>
            <button onclick="closeModal('depModal')" style="margin-top:20px; background:none; border:none; color:white; width:100%">ORQAGA</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-link active"><i class="fa fa-home"></i>ASOSIY</a>
        <a href="#" class="nav-link"><i class="fa fa-trophy"></i>SPORT</a>
        <a href="#" class="nav-link"><i class="fa fa-gamepad"></i>GAMES</a>
        <a href="#" class="nav-link"><i class="fa fa-headset"></i>SUPPORT</a>
        <a href="#" class="nav-link"><i class="fa fa-user"></i>PROFIL</a>
    </nav>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
