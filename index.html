<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICHI28 - Game Portal</title>
    <style>
        body { background-color: #0b0b0b; color: #d4af37; font-family: 'Arial', sans-serif; text-align: center; margin: 0; padding: 0; }
        .header { padding: 20px; border-bottom: 2px solid #d4af37; }
        .logo { font-size: 30px; font-weight: bold; letter-spacing: 2px; }
        .balance-card { background: linear-gradient(145deg, #1a1a1a, #000); margin: 20px; padding: 20px; border-radius: 15px; border: 1px solid #d4af37; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .game-item { background: #1a1a1a; padding: 20px; border-radius: 10px; border-bottom: 3px solid #d4af37; font-weight: bold; }
        .btn-deposit { background-color: #d4af37; color: black; padding: 15px 30px; border-radius: 25px; border: none; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">RICHI28</div>
    </div>
    <div class="balance-card">
        <p>Sizning balansingiz:</p>
        <h2 id="balance">0.00 UZS</h2>
    </div>
    <div class="game-grid">
        <div class="game-item" onclick="location.href='https://demo.spribe.io/games/aviator?currency=USD&lang=en'">
            🚀 AVIATOR (DEMO)
        </div>
        
        <div class="game-item" onclick="location.href='https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?gameSymbol=vs20olympgate&lang=en&cur=USD'">
            🎰 SLOTS (DEMO)
        </div>
        
        <div class="game-item" onclick="location.href='https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?gameSymbol=vs20pwrnudge&lang=en&cur=USD'">
            🃏 LIVE CASINO
        </div>
        
        <div class="game-item" onclick="alert('Sport liniyalari tez kunda ishga tushadi!')">
            ⚽ SPORT
        </div>
    </div>
    <button class="btn-deposit" onclick="alert('Hisobni to\'ldirish uchun botga chek yuboring!\n\nKarta: 8600 0000 0000 0000\nEga: K. MAMADALIYEV')">
    💳 HISOBNI TO'LDIRISH
</button>
</body>
</html>
