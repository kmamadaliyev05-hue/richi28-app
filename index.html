<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RICHI 28 | PREMIUM OMAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }
        .gold-gradient {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #fbf5b7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gold-btn {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #fbf5b7 100%);
            color: #000;
            font-weight: 900;
        }
        .neon-border {
            border: 1px solid rgba(191, 149, 63, 0.5);
            box-shadow: 0 0 20px rgba(191, 149, 63, 0.2);
        }
    </style>
</head>
<body class="flex flex-col h-screen p-6 justify-between">

    <div class="text-center">
        <h1 class="text-3xl font-black italic tracking-tighter gold-gradient">RICHI 28</h1>
        <p class="text-[10px] text-gray-500 tracking-[0.4em] uppercase">The Art of Luck</p>
    </div>

    <div class="space-y-6">
        <div class="p-8 rounded-[2.5rem] bg-zinc-900/40 neon-border text-center backdrop-blur-md">
            <p class="text-xs text-gray-400 uppercase tracking-widest mb-2">Joriy Jackpot</p>
            <h2 class="text-5xl font-black gold-gradient">10,000,000</h2>
            <p class="text-xs text-gray-500 mt-2">UZS</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-zinc-900/60 p-4 rounded-3xl border border-zinc-800">
                <p class="text-[10px] text-gray-500 uppercase">Balans</p>
                <p class="text-lg font-bold">0 so'm</p>
            </div>
            <div class="bg-zinc-900/60 p-4 rounded-3xl border border-zinc-800">
                <p class="text-[10px] text-gray-500 uppercase">Chiptalar</p>
                <p class="text-lg font-bold gold-gradient text-white">0 ta</p>
            </div>
        </div>
    </div>

    <div class="w-full space-y-4">
        <button id="buyBtn" class="w-full gold-btn py-5 rounded-2xl text-lg uppercase tracking-widest shadow-2xl active:scale-95 transition-transform">
            Chipta Sotib Olish
        </button>
        <p class="text-center text-[10px] text-gray-600 px-4">
            Ishtirok etish orqali siz loyiha qoidalariga rozilik bildirasiz.
        </p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Haptic Feedback (Vibratsiya)
        document.getElementById('buyBtn').addEventListener('click', () => {
            tg.HapticFeedback.impactOccurred('heavy');
            tg.showConfirm("Chipta narxi 10,000 so'm. Tasdiqlaysizmi?");
        });
    </script>
</body>
</html>
